<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quiz Provérbios</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <h1>📖 Quiz Provérbios</h1>

            <div id="start-screen">
                <p>Prepare-se para testar sua sabedoria!</p>
                <input type="text" id="firstName" placeholder="Nome" required>
                <input type="text" id="lastName" placeholder="Sobrenome" required>
                
                <button onclick="startGame()">▶️ Iniciar Jogo</button>
                <button id="view-leaderboard-btn" onclick="showLeaderboard()">🏆 Ver Placar</button>
            </div>

            <div id="quiz-container" style="display:none;">
                <div id="progress-bar" style="background: #333; height: 10px; border-radius: 5px; margin-bottom: 10px;">
                    <div id="progress-inner" style="background: #007bff; height: 100%; width: 0%; border-radius: 5px; transition: 0.3s;"></div>
                </div>
                
                <div id="timer-display" style="font-weight: bold; color: #ffc107; margin-bottom: 10px;">Tempo: 15s</div>
                
                <h2 id="question"></h2>
                <div id="answers"></div>
                <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima</button>
                <p style="font-size: 0.8em; color: #888;">Jogador: <span id="display-name"></span></p>
            </div>

            <div id="leaderboard-screen" style="display:none;">
                <h2>🏆 Melhores Pontuações</h2>
                <ul id="leaderboard-list">
                    </ul>
                <hr>
                <button onclick="goHome()">🏠 Voltar ao Início</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="script.js"></script>
    </body>
    </html>
